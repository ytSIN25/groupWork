<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIÈRE — Sign In</title>
  <link rel="stylesheet" href="css/base.css?v=5">
    <link rel="stylesheet" href="css/pages/auth.css?v=5">
    <link rel="stylesheet" href="css/global.css?v=5">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  
  
  
  <div class="film-grain"></div>
  <div class="page-transition active" id="pageTransition"><span class="trans-logo">LUMIÈRE</span></div>

  <section class="hp-hero">
    <div class="hero-bg" style="background-image:url('assets/images/hero-bg.png');"></div>
    <div class="hero-glow"></div>

    <div class="auth-wrapper scale-in" id="authWrapper">
      <div class="auth-flip-box">
        <div class="vintage-card auth-card auth-login">
          <div class="corner-dec corner-tl"></div><div class="corner-dec corner-tr"></div><div class="corner-dec corner-bl"></div><div class="corner-dec corner-br"></div>
          <div class="auth-header">
            <img src="assets/images/logo.svg?v=5" alt="LUMIÈRE Logo">
            <p>Welcome Back, Old Friend.</p>
          </div>
          <form id="loginForm">
            <div class="form-group"><label>Email Address</label><input type="email" placeholder="enter your email" required></div>
            <div class="form-group"><label>Password</label><input type="password" placeholder="enter your password" required></div>
            <button type="submit" class="btn-coral" style="width:100%; margin-top:10px;">Enter the Cinema</button>
          </form>
          <div class="auth-toggle">New patron? <a onclick="document.getElementById('authWrapper').classList.add('register-mode')">Request a Ticket</a></div>
        </div>
        <div class="vintage-card auth-card auth-register">
          <div class="corner-dec corner-tl"></div><div class="corner-dec corner-tr"></div><div class="corner-dec corner-bl"></div><div class="corner-dec corner-br"></div>
          <div class="auth-header">
            <img src="assets/images/logo.svg?v=5" alt="LUMIÈRE Logo">
            <p>Purchase a Lifetime Pass.</p>
          </div>
          <form id="registerForm">
            <div class="form-group"><label>Full Name</label><input type="text" placeholder="your name" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" placeholder="your email" required></div>
            <div class="form-group"><label>Choose Password</label><input type="password" placeholder="create a password" required></div>
            <button type="submit" class="btn-coral" style="width:100%; margin-top:10px;">Become a Member</button>
          </form>
          <div class="auth-toggle">Already a member? <a onclick="document.getElementById('authWrapper').classList.remove('register-mode')">Return to Lobby</a></div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js?v=5"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = e.target.querySelector('input[type="email"]').value;
      const pass = e.target.querySelector('input[type="password"]').value;
      
      console.log('Login attempt for:', email);

      try {
        const user = await API.login(email, pass);
        console.log('API Response:', user);
        
        if (user) {
          if (user.role === 'admin' || email === 'arthur@lumiere.com') {
            triggerPageTransition('dashboard-admin.html');
          } else {
            triggerPageTransition('dashboard-user.html');
          }
        } else {
          Swal.fire({
            title: 'Access Denied',
            text: 'Credentials not found in the Cinema Registry.',
            icon: 'error',
            background: '#1A1520',
            color: '#F2E8D5',
            confirmButtonColor: '#E8735A'
          });
        }
      } catch (err) {
        console.error('Login Error:', err);
        Swal.fire({ title: 'Error', text: 'Something went wrong with the login system.', icon: 'warning' });
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const name = e.target.querySelector('input[type="text"]').value;
      const email = e.target.querySelector('input[type="email"]').value;
      const pass = e.target.querySelector('input[type="password"]').value;

      const users = await API.getUsers();
      const newUser = {
        id: 'user-' + Date.now(),
        email: email,
        password: pass,
        name: name,
        role: 'patron',
        avatar: `https://api.dicebear.com/7.x/notionists/svg?seed=${name}`
      };

      users.push(newUser);
      localStorage.setItem('lumiere_users', JSON.stringify(users));
      triggerPageTransition('dashboard-user.html');
    });
  </script>
</body>
</html>
