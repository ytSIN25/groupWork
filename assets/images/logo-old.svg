<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" fill="none">
  <defs>
    <linearGradient id="goldGradLuxe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3"/>
      <stop offset="30%" style="stop-color:#D4AF37"/>
      <stop offset="70%" style="stop-color:#AA8030"/>
      <stop offset="100%" style="stop-color:#805515"/>
    </linearGradient>
    <linearGradient id="roseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8735A"/>
      <stop offset="50%" style="stop-color:#C4637A"/>
      <stop offset="100%" style="stop-color:#E8735A"/>
    </linearGradient>
    <radialGradient id="lensFlare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#E8C97A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Starry / Particle background details -->
  <circle cx="80" cy="40" r="1.5" fill="#E8C97A" opacity="0.6"/>
  <circle cx="110" cy="110" r="1" fill="#E8C97A" opacity="0.4"/>
  <circle cx="390" cy="30" r="2" fill="#E8C97A" opacity="0.8"/>
  <circle cx="420" cy="120" r="1.5" fill="#E8C97A" opacity="0.5"/>

  <!-- Vintage Projector / Camera detailed icon -->
  <g transform="translate(45, 20)">
    <!-- Light Beams from Lens -->
    <path d="M55,50 L140,-10 L140,110 Z" fill="url(#lensFlare)" opacity="0.3" filter="url(#glow)"/>
    <path d="M55,50 L120,20 L120,80 Z" fill="url(#lensFlare)" opacity="0.4"/>
    
    <!-- Reel 1 (Top) -->
    <circle cx="25" cy="20" r="15" fill="none" stroke="url(#goldGradLuxe)" stroke-width="2"/>
    <circle cx="25" cy="20" r="5" fill="url(#goldGradLuxe)"/>
    <path d="M25,5 L25,35 M10,20 L40,20 M14.39,9.39 L35.61,30.61 M14.39,30.61 L35.61,9.39" stroke="url(#goldGradLuxe)" stroke-width="1.5"/>
    
    <!-- Reel 2 (Bottom) -->
    <circle cx="35" cy="80" r="15" fill="none" stroke="url(#goldGradLuxe)" stroke-width="2"/>
    <circle cx="35" cy="80" r="5" fill="url(#goldGradLuxe)"/>
    <path d="M35,65 L35,95 M20,80 L50,80 M24.39,69.39 L45.61,90.61 M24.39,90.61 L45.61,69.39" stroke="url(#goldGradLuxe)" stroke-width="1.5"/>
    
    <!-- Camera Body -->
    <rect x="5" y="35" width="40" height="30" rx="4" fill="url(#goldGradLuxe)"/>
    <!-- Film strips connecting the reels -->
    <path d="M40,20 Q60,50 35,65" fill="none" stroke="url(#goldGradLuxe)" stroke-width="3" stroke-dasharray="2 1"/>
    
    <!-- Lens Elements -->
    <rect x="45" y="42" width="12" height="16" rx="2" fill="none" stroke="url(#goldGradLuxe)" stroke-width="2"/>
    <rect x="57" y="40" width="8" height="20" rx="2" fill="url(#goldGradLuxe)"/>
    <!-- Central Lens flare -->
    <circle cx="65" cy="50" r="3" fill="#FFF" filter="url(#glow)"/>
    <!-- Decorative Stand -->
    <path d="M25,65 L20,95 L30,95 Z" fill="url(#goldGradLuxe)"/>
    <line x1="10" y1="95" x2="40" y2="95" stroke="url(#goldGradLuxe)" stroke-width="3"/>
  </g>

  <!-- Central Title LUMIÈRE Elements -->
  <!-- Top decorative line -->
  <path d="M190,40 L250,40 L260,35 L270,40 L390,40" fill="none" stroke="url(#goldGradLuxe)" stroke-width="1.5" opacity="0.7"/>
  <polygon points="260,30 264,35 260,40 256,35" fill="url(#roseGlow)"/>

  <!-- Ornate typography -->
  <text x="290" y="88" text-anchor="middle" font-family="'Oswald', sans-serif" font-size="52" font-weight="700" fill="url(#goldGradLuxe)" letter-spacing="10" filter="url(#glow)">LUMIÈRE</text>
  
  <!-- Subtle shadow/glow for 3D effect -->
  <text x="290" y="88" text-anchor="middle" font-family="'Oswald', sans-serif" font-size="52" font-weight="700" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" letter-spacing="10">LUMIÈRE</text>

  <!-- Bottom decorative line -->
  <path d="M190,110 L250,110 L260,115 L270,110 L390,110" fill="none" stroke="url(#goldGradLuxe)" stroke-width="1.5" opacity="0.7"/>
  <polygon points="260,110 264,115 260,120 256,115" fill="url(#roseGlow)"/>

  <!-- Tagline using secondary Calligraphy font -->
  <text x="290" y="105" text-anchor="middle" font-family="'Great Vibes', cursive" font-size="22" fill="#E8735A" letter-spacing="2">Where every frame tells a story</text>
  
  <!-- Flourishes -->
  <!-- Left flourish -->
  <path d="M180,75 C160,75 145,60 145,45" fill="none" stroke="url(#goldGradLuxe)" stroke-width="1.2" opacity="0.6"/>
  <path d="M145,45 C145,70 160,85 180,85" fill="none" stroke="url(#goldGradLuxe)" stroke-width="1.2" opacity="0.6"/>
  
  <!-- Right flourish -->
  <path d="M400,75 C420,75 435,60 435,45" fill="none" stroke="url(#goldGradLuxe)" stroke-width="1.2" opacity="0.6"/>
  <path d="M435,45 C435,70 420,85 400,85" fill="none" stroke="url(#goldGradLuxe)" stroke-width="1.2" opacity="0.6"/>

</svg>
