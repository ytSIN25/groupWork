<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" fill="none">
  <defs>
    <linearGradient id="goldGradLuxe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B38B41" />
      <stop offset="50%" stop-color="#F2E8D5" />
      <stop offset="100%" stop-color="#B38B41" />
    </linearGradient>
    <filter id="luxeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Modern Minimal Emblem -->
  <g transform="translate(20, 20)" filter="url(#luxeGlow)">
    <circle cx="40" cy="40" r="38" stroke="url(#goldGradLuxe)" stroke-width="1.5" />
    <path d="M30 25 L30 55 L50 55" stroke="url(#goldGradLuxe)" stroke-width="4" stroke-linecap="square" fill="none" />
    <line x1="40" y1="2" x2="40" y2="8" stroke="url(#goldGradLuxe)" stroke-width="1.5" />
    <line x1="40" y1="72" x2="40" y2="78" stroke="url(#goldGradLuxe)" stroke-width="1.5" />
    <line x1="2" y1="40" x2="8" y2="40" stroke="url(#goldGradLuxe)" stroke-width="1.5" />
    <line x1="72" y1="40" x2="78" y2="40" stroke="url(#goldGradLuxe)" stroke-width="1.5" />
  </g>

  <!-- Wordmark - Adjusted position and letter spacing to fit 7 letters -->
  <text x="125" y="72" font-family="serif" font-size="58" font-weight="700" fill="url(#goldGradLuxe)" letter-spacing="10" filter="url(#luxeGlow)">LUMIÈRE</text>
  
  <!-- Divider Line -->
  <rect x="125" y="88" width="450" height="0.5" fill="url(#goldGradLuxe)" opacity="0.4" />

  <!-- Subtitle -->
  <text x="125" y="105" font-family="sans-serif" font-size="12" font-weight="400" fill="#B38B41" opacity="0.8" letter-spacing="8">PREMIUM CINEMATIC EXPERIENCE</text>
</svg>
